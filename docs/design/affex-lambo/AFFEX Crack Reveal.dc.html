<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=Heebo:wght@300;400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #0A0A0A; }
  @keyframes pulseDot { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }
  @keyframes blink { 0%,49% { opacity: 1; } 50%,100% { opacity: 0; } }
  @keyframes scanLine { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes sweep { 0% { transform: translateX(-120%); } 100% { transform: translateX(320%); } }
  @keyframes crackIn { from { opacity: 0; transform: translateY(16px) scale(0.985); } to { opacity: 1; transform: translateY(0) scale(1); } }
  @keyframes shootIn { from { transform: scaleX(0); } to { transform: scaleX(1); } }
</style>
</helmet>

<div dir="rtl" style="position: relative; width: 100%; height: 100vh; min-height: 620px; overflow: hidden; background: #0A0A0A; font-family: 'Heebo', sans-serif;">

  <!-- ═══ IVORY-FREE CRACK LAYER (result) ═══ -->
  <div style="position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; padding: clamp(24px,4vw,48px); background: radial-gradient(80% 70% at 50% 42%, rgba(245,197,24,0.07) 0%, rgba(10,10,10,0) 60%), #0A0A0A;">
    <sc-if value="{{ cracked }}" hint-placeholder-val="{{ false }}">
      <div style="width: 100%; max-width: 920px; animation: crackIn 0.7s cubic-bezier(0.2,0.9,0.1,1) both;">
        <div dir="ltr" style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px;">
          <div><div style="font-family: 'Oswald', sans-serif; font-size: clamp(22px,3vw,30px); font-weight: 600;">REELY</div><div style="font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #7A7A78; margin-top: 3px;">reely.io · AI / SaaS</div></div>
          <div style="font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.14em; color: #6E6E6C;">CRACKED · 1.9s</div>
        </div>
        <div style="border: 1px solid rgba(255,255,255,0.1); background: radial-gradient(90% 130% at 22% 0%, #17140A 0%, #0C0C0C 62%); padding: clamp(24px,3vw,40px);">
          <div style="display: grid; grid-template-columns: minmax(240px,0.9fr) minmax(260px,1.1fr); gap: clamp(24px,4vw,48px); align-items: start;">
            <div>
              <div style="display: flex; align-items: center; justify-content: space-between;"><span style="font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 0.2em; color: #8A8A88;">CRACK SCORE</span><span dir="ltr" style="font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: #0A0A0A; background: #F5C518; padding: 4px 9px;">▲ HOT</span></div>
              <div dir="ltr" style="display: flex; align-items: baseline; margin-top: 6px;"><span style="font-family: 'Oswald', sans-serif; font-size: clamp(96px,14vw,168px); font-weight: 600; line-height: 0.76; color: #F5C518;">{{ score }}</span><span style="font-family: 'Oswald', sans-serif; font-size: 28px; color: #4E4E4C; margin-inline-start: 8px;">/100</span></div>
              <div style="margin-top: 20px; display: inline-flex; align-items: center; gap: 9px; border: 1px solid rgba(245,197,24,0.4); background: rgba(245,197,24,0.06); color: #F5C518; padding: 9px 16px; font-size: 14px; font-weight: 700;"><span style="width: 6px; height: 6px; border-radius: 50%; background: #F5C518;"></span>הזדמנות אסטרטגית</div>
            </div>
            <div>
              <div style="font-family: 'IBM Plex Mono', monospace; font-size: 10.5px; letter-spacing: 0.14em; color: #8A8A88; margin-bottom: 16px;">THE EVIDENCE</div>
              <div style="display: flex; flex-direction: column; gap: 12px;">
                <sc-for list="{{ bars }}" as="b" hint-placeholder-count="5">
                  <div style="display: flex; align-items: center; gap: 12px;"><span style="width: 92px; font-size: 12px; color: {{ b.labelColor }}; flex-shrink: 0;">{{ b.label }}</span><div style="flex: 1; height: 4px; background: rgba(255,255,255,0.08); overflow: hidden;"><div style="width: {{ b.pct }}; height: 100%; background: {{ b.fill }}; transform-origin: right; animation: shootIn 0.6s cubic-bezier(0.2,0.9,0.1,1) {{ b.delay }} both;"></div></div><span dir="ltr" style="width: 26px; text-align: left; font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: {{ b.valColor }}; flex-shrink: 0;">{{ b.val }}</span></div>
                </sc-for>
              </div>
            </div>
          </div>
        </div>
        <div style="margin-top: 18px; display: flex; align-items: center; justify-content: center; gap: 16px;">
          <button class="cta" style="font-family: 'Heebo', sans-serif; font-size: 14px; font-weight: 700; color: #0A0A0A; background: #F5C518; border: none; padding: 13px 26px; cursor: pointer;">פתח את ההצעה ›</button>
          <button onClick="{{ replay }}" style="font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 0.1em; color: #8A8A88; background: transparent; border: 1px solid rgba(255,255,255,0.18); padding: 12px 18px; cursor: pointer;">↻ נגן שוב</button>
        </div>
      </div>
    </sc-if>
  </div>

  <!-- ═══ SCAN LAYER (generating) ═══ -->
  <div style="{{ scanStyle }}">
    <div style="width: 100%; max-width: 560px;">
      <div dir="ltr" style="display: flex; align-items: center; justify-content: space-between; font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.14em; margin-bottom: 32px;">
        <span style="color: #7A7A78;">AFFEX&nbsp; <span style="color: #45423B;">▸</span>&nbsp; <span style="color: #C9C9C7;">ANALYZING</span></span>
        <span style="display: flex; align-items: center; gap: 8px; color: #8A8A88;"><span style="color: #F5C518;">−8 CR</span><span style="width: 6px; height: 6px; border-radius: 50%; background: #F5C518; animation: pulseDot 1.4s ease-in-out infinite;"></span>LIVE</span>
      </div>
      <div dir="ltr" style="text-align: left;">
        <div style="font-family: 'Oswald', sans-serif; font-size: clamp(28px,4vw,38px); font-weight: 600; color: #EDEDEB;">REELY</div>
        <div style="margin-top: 6px; font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #6E6E6C;">reely.io · AI / SaaS · underwriting</div>
      </div>
      <div dir="ltr" style="margin-top: 28px; margin-bottom: 14px; display: flex; align-items: center; justify-content: space-between; font-family: 'IBM Plex Mono', monospace; font-size: 9.5px; letter-spacing: 0.16em; color: #55524A;"><span>SCORING 13 DIMENSIONS</span><span style="color: #8A8A88;">{{ scanPctLabel }}</span></div>
      <div style="display: flex; flex-direction: column;">
        <sc-for list="{{ shownDims }}" as="d" hint-placeholder-count="8">
          <div dir="ltr" style="display: flex; align-items: center; gap: 10px; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.05); animation: scanLine 0.34s cubic-bezier(0.2,0.9,0.1,1) both;">
            <span style="font-family: 'IBM Plex Mono', monospace; font-size: 11.5px; color: #8C877C; width: 172px; flex-shrink: 0;">{{ d.name }}</span>
            <span style="flex: 1; border-bottom: 1px dashed rgba(255,255,255,0.12); height: 1px;"></span>
            <span style="font-family: 'IBM Plex Mono', monospace; font-size: 12px; font-weight: 500; color: {{ d.color }}; width: 44px; text-align: right; flex-shrink: 0;">{{ d.val }}</span>
          </div>
        </sc-for>
      </div>
      <div style="margin-top: 24px; position: relative; height: 3px; background: rgba(255,255,255,0.08); overflow: hidden;">
        <div style="position: absolute; inset-inline-start: 0; top: 0; bottom: 0; width: {{ scanPct }}; background: #F5C518;"></div>
        <div style="position: absolute; top: 0; bottom: 0; width: 40%; background: linear-gradient(90deg, transparent, rgba(245,197,24,0.5), transparent); animation: sweep 1.1s linear infinite;"></div>
      </div>
      <div dir="ltr" style="margin-top: 16px; font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 0.12em; color: #C99A0F; display: flex; align-items: center; gap: 8px;"><span>◈ CRACKING OFFER</span><span style="animation: blink 1s step-end infinite; color: #F5C518;">▊</span></div>
    </div>
  </div>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;: {&quot;width&quot;: 1180, &quot;height&quot;: 760}}">
class Component extends DCLogic {
  state = { phase: 'scan', revealed: 0, scanT: 0, score: 0 };
  componentDidMount() { this.startScan(); }
  componentWillUnmount() { this.clearAll(); }
  clearAll() { if (this._raf) cancelAnimationFrame(this._raf); if (this._sraf) cancelAnimationFrame(this._sraf); if (this._iv) clearInterval(this._iv); if (this._t1) clearTimeout(this._t1); }

  startScan() {
    this.clearAll();
    this.setState({ phase: 'scan', revealed: 0, scanT: 0, score: 0 });
    this._iv = setInterval(() => this.setState((s) => { const n = Math.min(8, s.revealed + 1); if (n >= 8) clearInterval(this._iv); return { revealed: n }; }), 210);
    const dur = 2200, start = performance.now();
    const tick = (now) => { const t = Math.min(1, (now - start) / dur); this.setState({ scanT: t }); if (t < 1) this._sraf = requestAnimationFrame(tick); };
    this._sraf = requestAnimationFrame(tick);
    this._t1 = setTimeout(() => this.crack(), 2350);
  }
  crack() {
    this.setState({ phase: 'cracked', scanT: 1 });
    const dur = 900, target = 91, start = performance.now();
    const tick = (now) => { const t = Math.min(1, (now - start) / dur); this.setState({ score: Math.round((1 - Math.pow(1 - t, 3)) * target) }); if (t < 1) this._raf = requestAnimationFrame(tick); };
    this._raf = requestAnimationFrame(tick);
  }

  renderVals() {
    const cracked = this.state.phase === 'cracked';
    const Y = '#F5C518';
    const dimsAll = [
      { name: 'DEMAND', val: '88', s: true }, { name: 'SCALE POTENTIAL', val: '86', s: true }, { name: 'CASHFLOW FIT', val: '88', s: true },
      { name: 'COMPETITION', val: '72', s: false }, { name: 'OFFER TRUST', val: '80', s: true }, { name: 'COMPLIANCE', val: '90', s: true },
      { name: 'DATA CONFIDENCE', val: '70', s: false }, { name: 'CRACK SCORE', val: '91', s: true },
    ];
    const shownDims = dimsAll.slice(0, this.state.revealed).map((d) => ({ name: d.name, val: d.val, color: d.s ? '#FFCE2E' : '#9C978B' }));
    const scanPct = Math.round(this.state.scanT * 100) + '%';
    const scanPctLabel = String(Math.round(this.state.scanT * 100)).padStart(3, '0') + ' / 100';

    const scanBase = 'position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; padding: 48px; background: radial-gradient(120% 90% at 50% 40%, #16150F 0%, #0A0A08 78%); transition: opacity 0.6s cubic-bezier(0.4,0,0.2,1), transform 0.7s cubic-bezier(0.4,0,0.2,1), filter 0.6s ease;';
    const scanStyle = scanBase + (cracked ? 'opacity: 0; transform: scale(1.05); filter: blur(7px); pointer-events: none;' : 'opacity: 1; transform: scale(1); filter: blur(0);');

    const raw = [['Demand', '88', true], ['Scale', '86', true], ['Trust', '80', true], ['Competition', '72', false], ['Confidence', '70', false]];
    const bars = raw.map(([label, val, s], i) => ({ label, val, pct: val + '%', fill: s ? Y : '#4A4A48', valColor: s ? Y : '#8A8A88', labelColor: s ? '#C9C9C7' : '#8A8A88', delay: (0.15 + i * 0.09).toFixed(2) + 's' }));

    return { cracked, shownDims, scanPct, scanPctLabel, scanStyle, score: this.state.score, bars, replay: () => this.startScan() };
  }
}
</script>
</body>
</html>
