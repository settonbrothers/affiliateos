document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

umn; align-items: center; gap: 22px;\">\n        <div style=\"position: relative; width: 120px; height: 120px; background: #F5C518; display: flex; align-items: center; justify-content: center; overflow: hidden;\">\n          <span style=\"font-family: 'Oswald', sans-serif; font-size: 78px; font-weight: 700; line-height: 1; color: #0A0A0A;\">A<\u002Fspan>\n          <span style=\"position: absolute; top: 0; bottom: 0; right: 32.6%; width: 5.4%; background: #0A0A0A; transform: skewX(-16deg);\"><\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.14em; color: #6E6E6C;\">THE SPARK NOTCH · PRIMARY<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"border: 1px solid rgba(255,255,255,0.1); background: #0C0C0C; padding: 44px; display: flex; flex-direction: column; justify-content: center; gap: 14px;\">\n        <div style=\"font-family: 'Oswald', sans-serif; font-size: 18px; font-weight: 600; letter-spacing: 0.03em; color: #F5C518;\">הרעיון<\u002Fdiv>\n        <p style=\"margin: 0; font-size: 13.5px; color: #C9C9C7; line-height: 1.7;\">בלוק Giallo מלא עם <b style=\"color:#FFF;\">A<\u002Fb> בצבע דיו — חתוך בחריץ ניצוץ אלכסוני. החריץ הוא ה‑Crack: הרגע שבו הניתוח \"מפצח\" את ההצעה. הצורה נשארת ריבועית ומלאה כדי שתקרא גם ב‑16px וגם על באנר.<\u002Fp>\n        <p style=\"margin: 0; font-size: 12px; color: #8A8A88; line-height: 1.6;\">משלים את ה‑wordmark <span dir=\"ltr\" style=\"font-family:'Oswald';font-weight:700;\">AFF<span style=\"color:#F5C518;\">EX<\u002Fspan><\u002Fspan> — לא מחליף אותו.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ═══ 02 · CONSTRUCTION ═══ -->\n    <div style=\"display: flex; align-items: baseline; gap: 12px; margin-bottom: 20px;\"><span style=\"width: 4px; height: 20px; background: #F5C518;\"><\u002Fspan><span style=\"font-family: 'Oswald', sans-serif; font-size: 22px; font-weight: 600; letter-spacing: 0.03em;\">02 · CONSTRUCTION · CLEAR SPACE<\u002Fspan><\u002Fdiv> : 32.6%; width: 5.4%; background: #0A0A0A; transform: skewX(-16deg);\"><\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: #8A8A88;\">{{ s.label }}<\u002Fdiv>\n            <div style=\"font-family: 'Heebo', sans-serif; font-size: 10px; color: #6E6E6C; text-align: center; max-width: 90px;\">{{ s.use }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <div style=\"margin-top: 30px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.08); font-size: 12.5px; color: #8A8A88; line-height: 1.6;\">מינימום דיגיטלי <b style=\"color:#FFF;\">16px<\u002Fb> (favicon). מתחת ל‑16px החריץ נעלם — השתמש בבלוק צהוב מלא בלבד. מינימום דפוס <b style=\"color:#FFF;\">8mm<\u002Fb>.<\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ═══ 04 · VARIANTS ═══ -->\n    <div style=\"display: flex; align-items: baseline; gap: 12px; margin-bottom: 20px;\"><span style=\"width: 4px; height: 20px; background: #F5C518;\"><\u002Fspan><span style=\"font-family: 'Oswald', sans-serif; font-size: 22px; font-weight: 600; letter-spacing: 0.03em;\">04 · VARIANTS<\u002Fspan><\u002Fdiv>\n    <div style=\"display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 20px;\">\n      <!-- primary on dark -->\n      <div style=\"border: 1px solid rgba(255,255,255,0.1); background: #0C0C0C; padding: 30px; display: flex; flex-direction: column; align-items: center; gap: 16px;\">\n        <div style=\"position: relative; width: 72px; height: 72px; background: #F5C518; display: flex; align-items: center; justify-content: center; overflow: hidden;\"><span style=\"font-family: 'Oswald', sans-serif; font-size: 47px; font-weight: 700; color: #0A0A0A;\">A<\u002Fspan><span style=\"position: absolute; top: 0; bottom: 0; right: 32.6%; width: 5.4%; background: #0A0A0A; transform: skewX(-16deg);\"><\u002Fspan><\u002Fdiv>\n        <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 0.1em; color: #6E6E6C; text-align: center;\">PRIMARY<br>on dark<\u002Fdiv>\n      <\u002Fdiv>\n      <!-- on light -->\n      <div style=\"border: 1px solid rgba(255,255,255,0.1); background: #F4F4F2; padding: 30px; display: flex; flex-direction: column; align-items: center; gap: 16px;\">\n        <div style=\"position: relative; width: 72px; height: 72px; background: #F5C518; display: flex; align-items: center; justify-content: center; overflow: hidden;\"><span style=\"font-family: 'Oswald', sans-serif; font-size: 47px; font-weight: 700; color: #0A0A0A;\">A<\u002Fspan><span style=\"position: absolute; top: 0; bottom: 0; right: 32.6%; width: 5.4%; background: #0A0A0A; transform: skewX(-16deg);\"><\u002Fspan><\u002Fdiv>\n        <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 0.1em; color: #8A8A88; text-align: center;\">PRIMARY<br>on light<\u002Fdiv>\n      <\u002Fdiv>\n      <!-- mono ink glyph on light -->\n      <div style=\"border: 1px solid rgba(255,255,255,0.1); background: #F4F4F2; padding: 30px; display: flex; flex-direction: column; align-items: center; gap: 16px;\">\n        <div style=\"position: relative; width: 72px; height: 72px; display: flex; align-items: center; justify-content: center;\"><span style=\"font-family: 'Oswald', sans-serif; font-size: 60px; font-weight: 700; color: #0A0A0A;\">A<\u002Fspan><span style=\"position: absolute; top: 6px; bottom: 6px; right: 30%; width: 5.4%; background: #F4F4F2; transform: skewX(-16deg);\"><\u002Fspan><\u002Fdiv>\n        <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 0.1em; color: #8A8A88; text-align: center;\">MONO · KO<br>1‑color / ink<\u002Fdiv>\n      <\u002Fdiv>\n      <!-- mono white on dark -->\n      <div style=\"border: 1px solid rgba(255,255,255,0.1); background: #0C0C0C; padding: 30px; display: flex; flex-direction: column; align-items: center; gap: 16px;\">\n        <div style=\"position: relative; width: 72px; hei le=\"margin: 0; padding-inline-start: 18px; font-size: 13px; color: #C9C9C7; line-height: 1.9;\">\n          <li>Favicon · app icon · PWA<\u002Fli>\n          <li>אווטאר ברשתות · OG image פינה<\u002Fli>\n          <li>נאב מכווץ / מובייל hamburger<\u002Fli>\n          <li>מסך טעינה · ה‑scan→crack<\u002Fli>\n          <li>Watermark על creatives<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div style=\"border: 1px solid rgba(255,255,255,0.1); background: #0C0C0C; padding: 28px;\">\n        <div style=\"display: flex; align-items: center; gap: 12px; margin-bottom: 16px;\">\n          <span dir=\"ltr\" style=\"font-family: 'Oswald', sans-serif; font-size: 24px; font-weight: 700; letter-spacing: 0.03em;\">AFF<span style=\"color:#F5C518;\">EX<\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"margin: 0 0 12px; font-size: 12px; color: #8A8A88;\">בכל מקום שיש רוחב אופקי — זהו המצב הראשי:<\u002Fp>\n        <ul style=\"margin: 0; padding-inline-start: 18px; font-size: 13px; color: #C9C9C7; line-height: 1.9;\">\n          <li>נאב עליון של האפליקציה (Oswald 700, 21px)<\u002Fli>\n          <li>מסכי Auth / Onboarding<\u002Fli>\n          <li>Footer · חשבוניות · מיילים<\u002Fli>\n          <li>כותרות שיווק · שערי מצגות<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"border: 1px solid rgba(255,255,255,0.1); background: #0E0E0E; padding: 22px 26px; margin-bottom: 20px; font-size: 13px; color: #C9C9C7; line-height: 1.7;\">\n      <span style=\"font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.1em; color: #F5C518;\">LAMBORGHINI PATTERN · <\u002Fspan>\n      הסמל תמיד יושב במרכז מרחב שלילי נדיב ולעולם לא צפוף. בנאב האפליקציה — ממוקם ב‑start (RTL: ימין), קטן ושקט. במסכי splash/שיווק — ממורכז, מבודד, עם המון אוויר סביבו. הצהוב הוא נקודת השיא היחידה בפריים.\n    <\u002Fdiv>\n\n    <!-- ═══ 06 · DO / DON'T ═══ -->\n    <div style=\"display: flex; align-items: baseline; gap: 12px; margin-bottom: 20px;\"><span style=\"width: 4px; height: 20px; background: #F5C518;\"><\u002Fspan><span style=\"font-family: 'Oswald', sans-serif; font-size: 22px; font-weight: 600; letter-spacing: 0.03em;\">06 · DO · DON'T<\u002Fspan><\u002Fdiv>\n    <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px;\">\n      <div style=\"border: 1px solid rgba(255,255,255,0.1); background: #0C0C0C; padding: 26px;\">\n        <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 0.14em; color: #F5C518; margin-bottom: 16px;\">DO ✓<\u002Fdiv>\n        <ul style=\"margin: 0; padding-inline-start: 18px; font-size: 13px; color: #C9C9C7; line-height: 1.95;\">\n          <li>שמור פינות חדות — radius 0 תמיד<\u002Fli>\n          <li>Giallo <code>#F5C518<\u002Fcode> מדויק בלבד<\u002Fli>\n          <li>שמור על ה‑clear space<\u002Fli>\n          <li>השתמש ב‑A של Oswald 700 בלבד<\u002Fli>\n          <li>מרכז את הסמל במרחב שלו<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div style=\"border: 1px solid rgba(201,122,110,0.35); background: rgba(201,122,110,0.04); padding: 26px;\">\n        <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 0.14em; color: #C97A6E; margin-bottom: 16px;\">DON'T ✕<\u002Fdiv>\n        <ul style=\"margin: 0; padding-inline-start: 18px; font-size: 13px; color: #C9C9C7; line-height: 1.95;\">\n          <li>לא לעגל פינות, לא להוסיף צל/גרדיאנט<\u002Fli>\n          <li>לא למתוח, להטות או לסובב<\u002Fli>\n          <li>לא לשנות צבע ה‑A או ה‑Giallo<\u002Fli>\n          <li>לא להצמיד לטקסט/קצה בלי clear space<\u002Fli>\n          <li>לא להשתמש מתחת ל‑16px עם החריץ<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ═══ 07 · CODE HANDOFF ═══ -->\n    <div style=\"display: flex; align-items: baseline; gap: 12px; margin-bottom: 20px;\"><span style=\"width: 4px; height: 20px; background: #F5C518;\"><\u002Fspan><span style=\"font-family: 'Oswald', sans-serif; font-size: 22px; font-weight: 600; letter-spacing: 0.03em;\">07 · CODE HANDOFF<\u002Fspan><\u002Fdiv>\n    <div style=\"border: 1px solid rgba(255,255,255,0.1); background: #0C0C0C; padding: 0; margin-bottom: 20px;\">\n      <div style=\"padding: 14px 22px; border-bottom: 1px solid rgba(255,255,255,0.08); font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.14em; color: #6E6E6C;\">AffexMark.tsx — React / Tailwind (source of truth: Oswald נטען כבר)<\u002Fdiv>\n      <pre dir=\"ltr\" style=\"margin: 0; padding: 22px; overflow-x: auto; font-family: 'IBM Plex Mono', monospace; font-size: 12px; line-height: 1.7; color: #C9C9C7;\"><span style=\"color:#6E6E6C;\">// size = px. notch scales via %. A = Oswald 700 glyph.<\u002Fspan>\nexport function AffexMark({ size = 40 }: { size?: number }) {\n  return (\n    &lt;span style={{ position: <span style=\"color:#F5C518;\">\"relative\"<\u002Fspan>, width: size, height: size,\n      background: <span style=\"color:#F5C518;\">\"#F5C518\"<\u002Fspan>, display: <span style=\"color:#F5C518;\">\"grid\"<\u002Fspan>, placeItems: <span style=\"color:#F5C518;\">\"center\"<\u002Fspan> }}&gt;\n      &lt;span style={{ fontFamily: <span style=\"color:#F5C518;\">\"var(--font-display)\"<\u002Fspan>, fontWeight: 700,\n        fontSize: size * <span style=\"color:#F5C518;\">0.65<\u002Fspan>, lineHeight: 1, color: <span style=\"color:#F5C518;\">\"#0A0A0A\"<\u002Fspan> }}&gt;A&lt;/span&gt;\n      &lt;span style={{ position: <span style=\"color:#F5C518;\">\"absolute\"<\u002Fspan>, top: 0, bottom: 0,\n        insetInlineEnd: <span style=\"color:#F5C518;\">\"32.6%\"<\u002Fspan>, width: <span style=\"color:#F5C518;\">\"5.4%\"<\u002Fspan>,\n        background: <span style=\"color:#F5C518;\">\"#0A0A0A\"<\u002Fspan>, transform: <span style=\"color:#F5C518;\">\"skewX(-16deg)\"<\u002Fspan> }} /&gt;\n    &lt;/span&gt;\n  );\n}\n<span style=\"color:#6E6E6C;\">// Wordmark inline: &lt;span className=\"font-display font-bold\"&gt;AFF&lt;span className=\"text-primary\"&gt;EX&lt;/span&gt;&lt;/span&gt;<\u002Fspan><\u002Fpre>\n    <\u002Fdiv>\n    <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 16px;\">\n      <div style=\"border: 1px solid rgba(255,255,255,0.1); background: #0C0C0C; padding: 24px;\">\n        <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.1em; color: #6E6E6C; margin-bottom: 14px;\">FAVICON / APP ICON<\u002Fdiv>\n        <p style=\"margin: 0; font-size: 12.5px; color: #C9C9C7; line-height: 1.7;\">ייצא כ‑SVG סטטי: רבע חדות <code>#F5C518<\u002Fcode> + ה‑A ב‑Oswald 700 <b style=\"color:#FFF;\">מומר ל‑outlines<\u002Fb> (path), כדי שלא תלוי בפונט. שמור <code>16 / 32 / 180 / 512<\u002Fcode>. מתחת ל‑16px — השמט את החריץ.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"border: 1px solid rgba(255,255,255,0.1); background: #0C0C0C; padding: 24px;\">\n        <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.1em; color: #6E6E6C; margin-bottom: 14px;\">TOKENS<\u002Fdiv>\n        <div style=\"font-size: 12.5px; color: #C9C9C7; line-height: 1.9;\">\n          <div><code>--primary: #F5C518<\u002Fcode><\u002Fdiv>\n          <div><code>--primary-foreground: #0A0A0A<\u002Fcode><\u002Fdiv>\n          <div><code>--font-display: Oswald<\u002Fcode><\u002Fdiv>\n          <div><code>--radius: 0<\u002Fcode><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;: {&quot;width&quot;: 940, &quot;height&quot;: 1200}}\">\nclass Component extends DCLogic {\n  renderVals() {\n    const sizes = [\n      { px: '96px', fs: '62px', label: '96px', use: 'splash · app icon' },\n      { px: '48px', fs: '31px', label: '48px', use: 'nav · avatar' },\n      { px: '32px', fs: '21px', label: '32px', use: 'favicon @2x' },\n      { px: '16px', fs: '10px', label: '16px · min', use: 'favicon · חריץ בורג' },
