<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=Heebo:wght@300;400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #050505; }
  @keyframes pulseDot { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }
  @keyframes menuIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes rowIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
</style>
</helmet>

<div dir="rtl" style="min-height: 100vh; background: #050505; display: flex; align-items: flex-start; justify-content: center; padding: 24px; font-family: 'Heebo', sans-serif; gap: 40px; flex-wrap: wrap;">

  <!-- ══ PHONE 1 · AI PICKS ══ -->
  <div style="position: relative; width: 390px; height: 844px; background: #0A0A0A; border: 1px solid rgba(255,255,255,0.12); overflow: hidden; color: #FFFFFF;">
    <!-- top bar -->
    <div style="display: flex; align-items: center; justify-content: space-between; height: 56px; padding: 0 18px; border-bottom: 1px solid rgba(255,255,255,0.09);">
      <div style="display: flex; flex-direction: column; gap: 4px; cursor: pointer;"><span style="width: 20px; height: 2px; background: #FFFFFF;"></span><span style="width: 20px; height: 2px; background: #FFFFFF;"></span><span style="width: 13px; height: 2px; background: #F5C518;"></span></div>
      <div dir="ltr" style="display: flex; align-items: baseline; gap: 1px;"><span style="font-family: 'Oswald', sans-serif; font-size: 19px; font-weight: 700;">AFF</span><span style="font-family: 'Oswald', sans-serif; font-size: 19px; font-weight: 700; color: #F5C518;">EX</span></div>
      <div dir="ltr" style="display: flex; align-items: center; gap: 5px; font-family: 'IBM Plex Mono', monospace;"><span style="width: 5px; height: 5px; border-radius: 50%; background: #F5C518; animation: pulseDot 2s ease-in-out infinite;"></span><span style="font-size: 11px; font-weight: 600; color: #E4E4E2;">1,240</span></div>
    </div>
    <!-- content -->
    <div style="padding: 20px 18px; overflow-y: auto; height: calc(844px - 56px);">
      <div style="font-family: 'IBM Plex Mono', monospace; font-size: 9.5px; letter-spacing: 0.2em; color: #F5C518; margin-bottom: 8px;">TODAY'S OPPORTUNITIES</div>
      <h1 style="margin: 0 0 4px; font-size: 30px; font-weight: 800; line-height: 1;">ההזדמנויות<br>של היום</h1>
      <div dir="ltr" style="font-family: 'IBM Plex Mono', monospace; font-size: 10.5px; color: #7A7A78; margin-top: 10px;"><span style="color: #C9C9C7;">24</span> OFFERS · <span style="color: #F5C518;">6</span> SCORED · <span style="color: #F5C518;">2</span> HOT</div>
      <!-- filter chips -->
      <div style="display: flex; gap: 8px; margin: 18px 0; overflow-x: auto;">
        <span style="font-family: 'Heebo', sans-serif; font-size: 12.5px; font-weight: 700; color: #0A0A0A; background: #F5C518; padding: 7px 13px; white-space: nowrap;">הכל</span>
        <span style="font-family: 'Heebo', sans-serif; font-size: 12.5px; color: #B0B0AE; border: 1px solid rgba(255,255,255,0.16); padding: 7px 13px; white-space: nowrap;">מומלצות</span>
        <span style="font-family: 'Heebo', sans-serif; font-size: 12.5px; color: #B0B0AE; border: 1px solid rgba(255,255,255,0.16); padding: 7px 13px; white-space: nowrap; display: flex; align-items: center; gap: 5px;"><span style="width: 4px; height: 4px; border-radius: 50%; background: #F5C518;"></span>חמות</span>
        <span style="font-family: 'Heebo', sans-serif; font-size: 12.5px; color: #B0B0AE; border: 1px solid rgba(255,255,255,0.16); padding: 7px 13px; white-space: nowrap;">חדשות</span>
      </div>
      <!-- offer cards -->
      <div style="display: flex; flex-direction: column; gap: 10px;">
        <sc-for list="{{ offers }}" as="o" hint-placeholder-count="6">
          <div style="border: 1px solid {{ o.border }}; background: {{ o.bg }}; padding: 16px; animation: rowIn 0.45s cubic-bezier(0.2,0.9,0.1,1) {{ o.delay }} both;">
            <div style="display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;">
              <div style="min-width: 0;">
                <div style="display: flex; align-items: center; gap: 8px;">
                  <span dir="ltr" style="font-family: 'Oswald', sans-serif; font-size: 19px; font-weight: 600;">{{ o.name }}</span>
                  <sc-if value="{{ o.hot }}" hint-placeholder-val="{{ false }}"><span dir="ltr" style="font-family: 'IBM Plex Mono', monospace; font-size: 8px; color: #0A0A0A; background: #F5C518; padding: 2px 5px;">HOT</span></sc-if>
                </div>
                <div dir="ltr" style="font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: #6E6E6C; margin-top: 4px; text-align: right;">{{ o.url }} · {{ o.payout }}</div>
              </div>
              <div dir="ltr" style="display: flex; align-items: baseline; gap: 2px; flex-shrink: 0;"><span style="font-family: 'Oswald', sans-serif; font-size: 38px; font-weight: 600; line-height: 0.8; color: {{ o.scoreColor }};">{{ o.score }}</span><span style="font-family: 'Oswald', sans-serif; font-size: 12px; color: #4E4E4C;">/100</span></div>
            </div>
            <div style="display: flex; align-items: center; justify-content: space-between; margin-top: 14px;">
              <span style="display: inline-flex; align-items: center; gap: 6px; font-family: 'Heebo', sans-serif; font-size: 11.5px; font-weight: 600; color: {{ o.vColor }}; border: 1px solid {{ o.vBorder }}; padding: 4px 10px;"><span style="width: 4px; height: 4px; border-radius: 50%; background: {{ o.vDot }};"></span>{{ o.verdict }}</span>
              <span dir="ltr" style="font-family: 'IBM Plex Mono', monospace; font-size: 11.5px; color: {{ o.momColor }};">{{ o.mom }}</span>
            </div>
          </div>
        </sc-for>
      </div>
    </div>
  </div>

  <!-- ══ PHONE 2 · MENU OVERLAY ══ -->
  <div style="position: relative; width: 390px; height: 844px; background: #0A0A0A; border: 1px solid rgba(255,255,255,0.12); overflow: hidden; color: #FFFFFF;">
    <div style="position: absolute; inset: 0; background: radial-gradient(70% 50% at 80% 6%, rgba(245,197,24,0.08) 0%, rgba(10,10,10,0) 55%), #0A0A0A; display: flex; flex-direction: column; animation: menuIn 0.3s ease-out both;">
      <div style="display: flex; align-items: center; justify-content: space-between; height: 56px; padding: 0 18px; border-bottom: 1px solid rgba(255,255,255,0.09);">
        <span style="font-size: 22px; font-weight: 300; cursor: pointer;">✕</span>
        <div dir="ltr" style="display: flex; align-items: baseline; gap: 1px;"><span style="font-family: 'Oswald', sans-serif; font-size: 19px; font-weight: 700;">AFF</span><span style="font-family: 'Oswald', sans-serif; font-size: 19px; font-weight: 700; color: #F5C518;">EX</span></div>
        <span style="width: 24px;"></span>
      </div>
      <div style="flex: 1; padding: 40px 24px; display: flex; flex-direction: column;">
        <div style="font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.2em; color: #6E6E6C; margin-bottom: 24px;">MENU</div>
        <sc-for list="{{ nav }}" as="n" hint-placeholder-count="4">
          <div style="padding: 18px 0; border-bottom: 1px solid {{ n.rule }}; display: flex; align-items: center; justify-content: space-between;">
            <span dir="ltr" style="font-family: 'Oswald', sans-serif; font-size: 30px; font-weight: 600; color: {{ n.color }};">{{ n.en }}</span>
            <span style="font-family: 'Heebo', sans-serif; font-size: 13px; color: {{ n.heColor }};">{{ n.he }}</span>
          </div>
        </sc-for>
        <div style="margin-top: auto; display: flex; align-items: center; justify-content: space-between; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.09);">
          <div dir="ltr" style="display: flex; align-items: center; gap: 7px; font-family: 'IBM Plex Mono', monospace;"><span style="width: 6px; height: 6px; border-radius: 50%; background: #F5C518;"></span><span style="font-size: 13px; font-weight: 600; color: #E4E4E2;">1,240</span><span style="font-size: 10px; color: #7A7A78;">CREDITS</span></div>
          <span style="font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #8A8A88; border: 1px solid rgba(255,255,255,0.16); padding: 4px 9px;">EN</span>
        </div>
      </div>
    </div>
  </div>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;: {&quot;width&quot;: 860, &quot;height&quot;: 900}}">
class Component extends DCLogic {
  state = { t: 0 };
  componentDidMount() {
    const dur = 900, start = performance.now();
    const tick = (now) => { const t = Math.min(1, (now - start) / dur); this.setState({ t: 1 - Math.pow(1 - t, 3) }); if (t < 1) this._raf = requestAnimationFrame(tick); };
    this._raf = requestAnimationFrame(tick);
  }
  componentWillUnmount() { if (this._raf) cancelAnimationFrame(this._raf); }
  renderVals() {
    const Y = '#F5C518';
    const t = this.state.t;
    const raw = [
      { name: 'REELY', url: 'reely.io', payout: '$180 +30%', score: 91, mom: '▲ +6', hot: true, v: 'תקרה גבוהה', tier: 'hi' },
      { name: 'NOVALEDGER', url: 'novaledger.app', payout: '$140 CPA', score: 87, mom: '▲ +9', hot: true, v: 'אסטרטגית', tier: 'hi' },
      { name: 'LEANBIOME', url: 'getleanbiome.com', payout: '$95 CPS', score: 84, mom: '▲ +3', hot: false, v: 'אסטרטגית', tier: 'hi' },
      { name: 'ARIA', url: 'aria.date', payout: '$45 CPA', score: 79, mom: '▲ +4', hot: false, v: 'בדיקה', tier: 'mid' },
      { name: 'PLAYVAULT', url: 'playvault.gg', payout: '$2.10 CPI', score: 71, mom: '▼ -2', hot: false, v: 'מעקב', tier: 'low' },
      { name: 'CRYPTOPULSE', url: 'cryptopulse.io', payout: '$220 CPA', score: 63, mom: '▼ -5', hot: false, v: 'דחייה', tier: 'low' },
    ];
    const offers = raw.map((o, i) => {
      const strong = o.score >= 80, mid = o.score >= 65 && o.score < 80;
      let vColor, vBorder, vDot;
      if (o.tier === 'hi') { vColor = Y; vBorder = 'rgba(245,197,24,0.4)'; vDot = Y; }
      else if (o.tier === 'mid') { vColor = '#E4E4E2'; vBorder = 'rgba(255,255,255,0.16)'; vDot = '#B0B0AE'; }
      else { vColor = '#8A8A88'; vBorder = 'rgba(255,255,255,0.09)'; vDot = '#5E5E5C'; }
      return {
        name: o.name, url: o.url, payout: o.payout, hot: o.hot, verdict: o.v,
        score: Math.round(t * o.score),
        scoreColor: strong ? Y : (mid ? '#FFFFFF' : '#6E6E6C'),
        momColor: o.mom.includes('▲') ? '#C9C9C7' : '#6E6E6C',
        vColor, vBorder, vDot,
        border: i === 0 ? 'rgba(245,197,24,0.4)' : 'rgba(255,255,255,0.1)',
        bg: i === 0 ? 'rgba(245,197,24,0.05)' : '#0C0C0C',
        delay: (0.05 + i * 0.05).toFixed(2) + 's',
      };
    });
    const nav = [
      { en: 'AI PICKS', he: 'הצעות', active: true },
      { en: 'CAMPAIGNS', he: 'קמפיינים', active: false },
      { en: 'BILLING', he: 'חיוב', active: false },
      { en: 'ADMIN', he: 'ניהול', active: false },
    ].map((n) => ({ en: n.en, he: n.he, color: n.active ? Y : '#FFFFFF', heColor: n.active ? Y : '#6E6E6C', rule: n.active ? 'rgba(245,197,24,0.4)' : 'rgba(255,255,255,0.08)' }));
    return { offers, nav };
  }
}
</script>
</body>
</html>
